<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4지선다 퀴즈 프로그램</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-5">📚 4지선다 퀴즈 프로그램</h1>
        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="add-tab" data-bs-toggle="tab" data-bs-target="#add" type="button" role="tab">✍️ 문제 만들기</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="take-tab" data-bs-toggle="tab" data-bs-target="#take" type="button" role="tab">🧠 문제 풀기</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="ocr-tab" data-bs-toggle="tab" data-bs-target="#ocr" type="button" role="tab">📸 사진으로 문제 생성</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="manage-tab" data-bs-toggle="tab" data-bs-target="#manage" type="button" role="tab">⚙️ 문제 관리</button>
            </li>
        </ul>
        <div class="tab-content" id="myTabContent">
            <div class="tab-pane fade show active" id="add" role="tabpanel">
                <h2 class="mt-3">✍️ 새 퀴즈 추가</h2>
                <form id="add-quiz-form" class="row g-3">
                    <div class="col-12">
                        <label for="question" class="form-label">문제:</label>
                        <input type="text" class="form-control" id="question" required>
                    </div>
                    <div class="col-md-6">
                        <label for="option1" class="form-label">선택지 1:</label>
                        <input type="text" class="form-control" id="option1" required>
                    </div>
                    <div class="col-md-6">
                        <label for="option2" class="form-label">선택지 2:</label>
                        <input type="text" class="form-control" id="option2" required>
                    </div>
                    <div class="col-md-6">
                        <label for="option3" class="form-label">선택지 3:</label>
                        <input type="text" class="form-control" id="option3" required>
                    </div>
                    <div class="col-md-6">
                        <label for="option4" class="form-label">선택지 4:</label>
                        <input type="text" class="form-control" id="option4" required>
                    </div>
                    <div class="col-md-6">
                        <label for="answer" class="form-label">정답 번호 (1-4):</label>
                        <input type="number" class="form-control" id="answer" min="1" max="4" required>
                    </div>
                    <div class="col-md-6">
                        <label for="tags" class="form-label">태그 (콤마로 구분):</label>
                        <input type="text" class="form-control" id="tags" placeholder="예: 외환, 기초">
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">➕ 퀴즈 추가</button>
                    </div>
                </form>
                <div id="add-message" class="mt-3"></div>
            </div>
            <div class="tab-pane fade" id="take" role="tabpanel">
                <h2 class="mt-3">🧠 퀴즈 도전하기</h2>
                <div class="row g-3">
                    <div class="col-12">
                        <label for="tag-filter" class="form-label">태그 필터 (콤마로 구분, 빈 칸이면 전체):</label>
                        <input type="text" class="form-control" id="tag-filter" placeholder="예: 외환, 기초">
                    </div>
                    <div class="col-12">
                        <button id="start-quiz" class="btn btn-success">🚀 퀴즈 시작</button>
                    </div>
                </div>
                <div id="quiz-container" class="mt-4" style="display:none;">
                    <div id="quiz-questions"></div>
                    <button id="submit-quiz" class="btn btn-primary mt-3">✅ 답 제출</button>
                </div>
                <div id="results" class="mt-4" style="display:none;">
                    <h3>결과</h3>
                    <div id="score" class="alert alert-info"></div>
                    <div id="details"></div>
                </div>
            </div>            <div class="tab-pane fade" id="ocr" role="tabpanel">
                <h2 class="mt-3">📸 사진으로 문제 생성</h2>
                <div class="row g-3">
                    <div class="col-12">
                        <label for="image-upload" class="form-label">📷 문제 사진 선택:</label>
                        <input type="file" class="form-control" id="image-upload" accept="image/*" required>
                    </div>
                    <div class="col-12">
                        <img id="preview-image" src="" alt="Preview" style="max-width: 100%; max-height: 400px; display: none; margin-top: 20px; border-radius: 10px;">
                    </div>
                    <div class="col-12">
                        <button id="extract-ocr-btn" class="btn btn-info">🔍 OCR로 텍스트 추출</button>
                    </div>
                </div>
                <div id="ocr-result" style="display:none;" class="mt-4">
                    <h3>추출된 텍스트:</h3>
                    <textarea id="ocr-text" class="form-control" rows="10" placeholder="추출된 텍스트가 여기에 표시됩니다."></textarea>
                    <div class="mt-3">
                        <p class="text-muted">💡 텍스트를 수정한 후 아래 형식으로 입력하세요:</p>
                        <small>문제: [문제 내용]<br>1. [선택지1]<br>2. [선택지2]<br>3. [선택지3]<br>4. [선택지4]<br>정답: [1-4]</small>
                    </div>
                    <button id="save-ocr-quiz" class="btn btn-success mt-3">💾 퀴즈 저장</button>
                </div>
            </div>            <div class="tab-pane fade" id="manage" role="tabpanel">
                <h2 class="mt-3">⚙️ 퀴즈 관리</h2>
                <button id="load-quizzes-btn" class="btn btn-info mb-3">📋 목록 불러오기</button>
                <div id="quizzes-list"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
